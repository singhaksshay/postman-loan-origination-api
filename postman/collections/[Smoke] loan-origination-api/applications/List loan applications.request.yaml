type: http
name: List loan applications
url: '{{baseUrl}}/applications?status=denied&productType=home_equity&limit=25&offset=0'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: denied
    description: Filter by application status
  - key: productType
    value: home_equity
    description: Filter by loan product type
  - key: limit
    value: '25'
  - key: offset
    value: '0'
