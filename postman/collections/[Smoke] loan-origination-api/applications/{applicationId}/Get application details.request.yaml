type: http
name: Get application details
url: '{{baseUrl}}/applications/:applicationId'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: applicationId
    value: string
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 8473.437937098512,
            "termMonths": 398,
            "status": "submitted",
            "createdAt": "1966-07-13T21:46:56.474Z",
            "updatedAt": "1949-11-23T07:24:04.820Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "in_progress",
              "decision": "denied",
              "riskScore": 12,
              "evaluatedAt": "1961-04-29T01:57:49.406Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application not found
