type: http
name: Upload a document
url: '{{baseUrl}}/applications/:applicationId/documents'
method: POST
headers:
  - key: Content-Type
    value: multipart/form-data
  - key: Accept
    value: application/json
pathVariables:
  - key: applicationId
    value: string
body:
  type: formdata
  content:
    - key: file
      type: file
    - key: documentType
      value: tax_return
      type: text
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicationId": "string",
            "documentType": "string",
            "fileName": "string",
            "uploadedAt": "2000-01-12T08:43:21.301Z",
            "verificationStatus": "pending"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Document uploaded successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Invalid document or unsupported format
