type: http
name: Trigger underwriting evaluation
url: '{{baseUrl}}/applications/:applicationId/underwriting'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: applicationId
    value: string
body:
  type: json
  content: |-
    {
      "reevaluationReason": "string",
      "includeManualReview": false
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 202
      statusText: Accepted
      body:
        type: json
        content: |-
          {
            "applicationId": "string",
            "status": "completed",
            "decision": "referred_to_manual",
            "riskScore": 70,
            "evaluatedAt": "1949-02-16T15:32:19.508Z"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Underwriting evaluation queued
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Application not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: text
        content: ''
    name: Underwriting already in progress
