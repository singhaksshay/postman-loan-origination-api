type: http
name: List loan applications
url: '{{baseUrl}}/applications?status=under_review&productType=business_loan&limit=25&offset=0'
method: GET
headers:
  - key: Accept
    value: application/json
queryParams:
  - key: status
    value: under_review
    description: Filter by application status
  - key: productType
    value: business_loan
    description: Filter by loan product type
  - key: limit
    value: '25'
  - key: offset
    value: '0'
